document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: -.01em;\">\n      <svg width=\"24\" height=\"24\" viewBox=\"0 0 100 100\" aria-hidden=\"true\" style=\"color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n      <span>Grovely<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-left: auto; display: flex; gap: 4px; flex-wrap: wrap; font-size: 13px; font-weight: 600;\">\n      <a href=\"#names\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Name<\u002Fa>\n      <a href=\"#logo\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Logo<\u002Fa>\n      <a href=\"#icon\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Icon<\u002Fa>\n      <a href=\"#together\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Together<\u002Fa>\n      <a href=\"#color\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Color<\u002Fa>\n      <a href=\"#type\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Type<\u002Fa>\n      <a href=\"#plants\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Plants<\u002Fa>\n      <a href=\"#themes\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Themes<\u002Fa>\n      <a href=\"#screens\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Screens<\u002Fa>\n      <a href=\"#tokens\" style=\"color: #4A5A50; text-decoration: none; padding: 7px 11px; border-radius: 9px;\" style-hover=\"color:#18241D; background:#E7EEE7\">Tokens<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===== COVER ===== -->\n  <header style=\"position: relative; overflow: hidden; padding: 96px 26px 92px; text-align: center; background: radial-gradient(120% 90% at 50% -10%, #DCEFE0 0%, #F3F6F1 58%);\">\n    <div style=\"position: relative; max-width: 940px; margin: 0 auto;\">\n      <div style=\"display: inline-flex; align-items: center; gap: 8px; padding: 7px 15px; border-radius: 999px; background: #FFFFFF; border: 1px solid #DCE6DD; font-size: 12.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #2E7D52; box-shadow: 0 1px 2px rgba(24,36,29,.04);\">Brand Identity · v4<\u002Fdiv>\n\n      <div style=\"display: flex; justify-content: center; margin: 30px 0 8px; animation: gv-float 6s ease-in-out infinite;\">\n        <svg width=\"124\" height=\"124\" viewBox=\"0 0 100 100\" aria-hidden=\"true\" style=\"color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n      <\u002Fdiv>\n\n      <h1 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: clamp(56px, 11vw, 132px); line-height: .92; letter-spacing: -.035em; margin: 6px 0 0; color: #1E5238;\">Grovely<\u002Fh1>\n      <p style=\"font-size: clamp(17px, 2.4vw, 22px); line-height: 1.5; max-width: 600px; margin: 22px auto 0; color: #3A4D42; text-wrap: balance;\">{{ tagline }}<\u002Fp>\n\n      <div style=\"display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 30px;\">\n        <span style=\"padding: 9px 16px; border-radius: 999px; background: #2E7D52; color: #fff; font-weight: 600; font-size: 14px;\">Focus, together<\u002Fspan>\n        <span style=\"padding: 9px 16px; border-radius: 999px; background: #fff; border: 1px solid #DCE6DD; color: #3A4D42; font-weight: 600; font-size: 14px;\">Calm · Encouraging · Alive<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== NAMES ===== -->\n  <section id=\"names\" style=\"max-width: 1100px; margin: 0 auto; padding: 84px 26px 40px;\">\n    <div style=\"display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 6px;\">\n      <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">01 · Naming<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(30px, 4.6vw, 46px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 16px;\">The name<\u002Fh2>\n    <p style=\"font-size: 17px; line-height: 1.6; max-width: 640px; color: #3A4D42; margin: 0 0 40px;\">The heart of the product is the <strong style=\"color:#18241D;\">collective garden<\u002Fstrong> — a small circle growing in real time. The name should feel like community and shared growth, not solo grind. The name we landed on: <strong style=\"color:#2E7D52;\">Grovely<\u002Fstrong>.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px;\">\n\n      <div style=\"position: relative; background: #fff; border: 1.5px solid #2E7D52; border-radius: 22px; padding: 26px; box-shadow: 0 14px 34px rgba(46,125,82,.12);\">\n        <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 38px; letter-spacing: -.02em; color: #1E5238;\">Grovely<\u002Fdiv>\n        <div style=\"font-size: 13px; font-weight: 600; color: #2E7D52; margin: 4px 0 14px;\">/ˈɡroʊv·li/ · \"a small grove, lovingly\"<\u002Fdiv>\n        <p style=\"font-size: 14.5px; line-height: 1.6; color: #3A4D42; margin: 0 0 14px;\">A <em>grove<\u002Fem> is a small cluster of trees — the perfect metaphor for a 6–12 person circle. The \"-ly\" adverb ending makes it warm and human, almost an encouragement.<\u002Fp>\n        <div style=\"display: grid; gap: 7px; font-size: 13.5px;\">\n          <div style=\"display:flex; gap:8px;\"><span style=\"color:#2E7D52; font-weight:700;\">+<\u002Fspan><span style=\"color:#3A4D42;\">Ownable, short, easy worldwide pronunciation<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:8px;\"><span style=\"color:#2E7D52; font-weight:700;\">+<\u002Fspan><span style=\"color:#3A4D42;\">\"Grove\" = collective by nature, distances us from <em>Forest<\u002Fem><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== LOGO ===== -->\n  <section id=\"logo\" style=\"max-width: 1100px; margin: 0 auto; padding: 64px 26px 40px;\">\n    <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">02 · Logo &amp; wordmark<\u002Fspan>\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(30px, 4.6vw, 46px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 32px;\">The wordmark<\u002Fh2>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px;\">\n      <!-- primary lockup -->\n      <div style=\"grid-column: 1 / -1; background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 48px; display: flex; align-items: center; justify-content: center; gap: 4px;\">\n        <svg width=\"76\" height=\"76\" viewBox=\"0 0 100 100\" aria-hidden=\"true\" style=\"margin-right: 10px;;color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n        <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 64px; letter-spacing: -.03em; color: #1E5238;\">Grovely<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- stacked lockup -->\n      <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;\">\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #8A9890; margin-bottom: 18px; align-self: flex-start;\">Stacked lockup<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; align-items: center; gap: 6px; min-height: 80px; justify-content: center;\">\n          <svg width=\"54\" height=\"54\" viewBox=\"0 0 100 100\" aria-hidden=\"true\" style=\"color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n          <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 34px; letter-spacing: -.03em; color: #1E5238;\">Grovely<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- monochrome -->\n      <div style=\"background: #1E5238; border: 1px solid #1E5238; border-radius: 22px; padding: 30px;\">\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #9FD4B2; margin-bottom: 20px;\">Monochrome / reversed<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 80px;\">\n          <svg width=\"46\" height=\"46\" viewBox=\"0 0 100 100\" aria-hidden=\"true\" style=\"color:#FFFFFF;--gv-sun:#FFFFFF\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n          <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 46px; letter-spacing: -.03em; color: #FFFFFF;\">Grovely<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- clearspace / minsize note -->\n      <div style=\"grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 14px;\">\n        <div style=\"flex: 1; min-width: 220px; background: #fff; border: 1px solid #DCE6DD; border-radius: 18px; padding: 22px; display: flex; gap: 16px; align-items: center;\">\n          <div style=\"position: relative; padding: 18px; border: 1.5px dashed #B6CABB; border-radius: 12px;\">\n            <svg width=\"40\" height=\"40\" viewBox=\"0 0 100 100\" style=\"color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight: 700; font-size: 15px; color: #18241D;\">Clear space<\u002Fdiv>\n            <div style=\"font-size: 13.5px; color: #3A4D42; line-height: 1.5; margin-top: 2px;\">Keep padding equal to one tree-width around the mark on all sides.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex: 1; min-width: 220px; background: #fff; border: 1px solid #DCE6DD; border-radius: 18px; padding: 22px; display: flex; gap: 16px; align-items: center;\">\n          <div style=\"display: flex; align-items: flex-end; gap: 10px;\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 100 100\" style=\"color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n            <svg width=\"32\" height=\"32\" viewBox=\"0 0 100 100\" style=\"color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight: 700; font-size: 15px; color: #18241D;\">Minimum size<\u002Fdiv>\n            <div style=\"font-size: 13.5px; color: #3A4D42; line-height: 1.5; margin-top: 2px;\">Symbol stays legible to 20px; full wordmark no smaller than 88px wide.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== APP ICON ===== -->\n  <section id=\"icon\" style=\"max-width: 1100px; margin: 0 auto; padding: 64px 26px 40px;\">\n    <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">03 · Symbol &amp; app icon<\u002Fspan>\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(30px, 4.6vw, 46px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 12px;\">A little grove<\u002Fh2>\n    <p style=\"font-size: 17px; line-height: 1.6; max-width: 640px; color: #3A4D42; margin: 0 0 28px;\">The v1 radial mark read as a flower — concept right, legibility wrong. v2 went literal with three rounded trees, but the crowns read as lollipops. <strong style=\"color:#18241D;\">v4 commits to conifers<\u002Fstrong>: three pines in rising heights, so the silhouette is unmistakably a tree at any size. The cluster still implies the circle of friends, and a single sun keeps it warm. Bold, tiered shape holds down to 32px.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; align-items: start;\">\n\n      <!-- 512 master -->\n      <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 28px; text-align: center;\">\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #8A9890; margin-bottom: 18px;\">Master · 512×512<\u002Fdiv>\n        <div style=\"width: 180px; height: 180px; margin: 0 auto; border-radius: 40px; background: #2E7D52; display: flex; align-items: center; justify-content: center; box-shadow: 0 16px 34px rgba(46,125,82,.28);\">\n          <svg width=\"116\" height=\"116\" viewBox=\"0 0 100 100\" style=\"color:#FFFFFF;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Android adaptive -->\n      <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 28px; text-align: center;\">\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #8A9890; margin-bottom: 18px;\">Android adaptive<\u002Fdiv>\n        <div style=\"display: flex; justify-content: center; gap: 14px; flex-wrap: wrap;\">\n          <div>\n            <div style=\"width: 96px; height: 96px; border-radius: 18px; background: #2E7D52; position: relative; overflow: hidden;\">\n              <div style=\"position: absolute; inset: 0; border: 1px dashed rgba(255,255,255,.35); border-radius: 50%; margin: 18px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size: 11px; color: #8A9890; margin-top: 6px; font-weight: 600;\">background<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"width: 96px; height: 96px; border-radius: 18px; background: #EEF4EF; position: relative; overflow: hidden;\">\n              <svg width=\"64\" height=\"64\" viewBox=\"0 0 100 100\" style=\"position: absolute; top: 16px; left: 16px;;color:#2E7D52;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size: 11px; color: #8A9890; margin-top: 6px; font-weight: 600;\">foreground<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"width: 96px; height: 96px; border-radius: 50%; background: #2E7D52; display: flex; align-items: center; justify-content: center;\">\n              <svg width=\"62\" height=\"62\" viewBox=\"0 0 100 100\" style=\"color:#FFFFFF;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size: 11px; color: #8A9890; margin-top: 6px; font-weight: 600;\">masked (circle)<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 12.5px; color: #6E7E74; line-height: 1.5; margin: 16px 0 0;\">Symbol sits inside the 66% safe zone so OEM masks never clip a tree.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- size legibility -->\n      <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 28px; text-align: center;\">\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #8A9890; margin-bottom: 18px;\">Scales down clean<\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-end; justify-content: center; gap: 16px;\">\n          <div style=\"text-align:center;\">\n            <div style=\"width: 72px; height: 72px; border-radius: 16px; background: #2E7D52; display: flex; align-items: center; justify-content: center;\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 100 100\" style=\"color:#fff;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-size: 11px; color: #8A9890; margin-top: 6px;\">72px<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <div style=\"width: 48px; height: 48px; border-radius: 11px; background: #2E7D52; display: flex; align-items: center; justify-content: center;\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 100 100\" style=\"color:#fff;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-size: 11px; color: #8A9890; margin-top: 6px;\">48px<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <div style=\"width: 32px; height: 32px; border-radius: 8px; background: #2E7D52; display: flex; align-items: center; justify-content: center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 100 100\" style=\"color:#fff;--gv-sun:#E0A458\"><use href=\"#gv-mark\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-size: 11px; color: #8A9890; margin-top: 6px;\">32px<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== GROWING TOGETHER ===== -->\n  <section id=\"together\" style=\"max-width: 1100px; margin: 0 auto; padding: 64px 26px 40px;\">\n    <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">04 · Growing together<\u002Fspan>\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(30px, 4.6vw, 46px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 12px;\">Showing growth in a group<\u002Fh2>\n    <p style=\"font-size: 17px; line-height: 1.6; max-width: 660px; color: #3A4D42; margin: 0 0 30px;\">The app icon stays the grove. But across the product — loading states, the collective screen, share cards — we need a <strong style=\"color:#18241D;\">motif for many people growing as one<\u002Fstrong>. The defined motif: <strong style=\"color:#18241D;\">shared roots<\u002Fstrong> — separate trees of different heights, one connected root system.<\u002Fp>\n\n    <!-- featured: shared roots -->\n    <div style=\"display: grid; grid-template-columns: minmax(260px, 1.15fr) 1fr; gap: 0; background: #fff; border: 1.5px solid #2E7D52; border-radius: 24px; overflow: hidden; box-shadow: 0 16px 40px rgba(46,125,82,.13); margin-bottom: 18px;\">\n      <div style=\"background: linear-gradient(180deg, #EAF4EC 0%, #DCEFE0 100%); padding: 30px; display: flex; align-items: center; justify-content: center; position: relative;\">\n        <div style=\"position: absolute; top: 16px; left: 16px; font-size: 10px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase; color: #fff; background: #2E7D52; padding: 4px 10px; border-radius: 999px;\">Collective motif<\u002Fdiv>\n        <svg width=\"100%\" viewBox=\"0 0 240 150\" style=\"max-width: 320px;\">\n          <!-- ground -->\n          <path d=\"M14 92 Q120 80 226 92 L226 96 Q120 86 14 96 Z\" fill=\"#C2A878\"><\u002Fpath>\n          <line x1=\"16\" y1=\"93\" x2=\"224\" y2=\"93\" stroke=\"#A6855E\" stroke-width=\"1\" stroke-dasharray=\"2 5\" stroke-linecap=\"round\" opacity=\".7\"><\u002Fline>\n          <!-- roots web -->\n          <g fill=\"none\" stroke=\"#9A7B54\" stroke-linecap=\"round\">\n            <path d=\"M68 92 C 64 110 92 116 116 126\" stroke-width=\"3\"><\u002Fpath>\n            <path d=\"M68 92 C 70 108 52 116 40 130\" stroke-width=\"2.4\"><\u002Fpath>\n            <path d=\"M120 92 C 120 112 104 120 86 130\" stroke-width=\"3.4\"><\u002Fpath>\n            <path d=\"M120 92 C 120 112 138 120 156 130\" stroke-width=\"3.4\"><\u002Fpath>\n            <path d=\"M172 92 C 176 108 150 116 126 126\" stroke-width=\"3\"><\u002Fpath>\n            <path d=\"M172 92 C 170 108 188 116 202 130\" stroke-width=\"2.4\"><\u002Fpath>\n          <\u002Fg>\n          <!-- trees -->\n          <!-- left -->\n          <path d=\"M64 92 C 64 84 66 70 67 64 L69 64 C 70 70 72 84 72 92 Z\" fill=\"#8A6A46\"><\u002Fpath>\n          <circle cx=\"68\" cy=\"58\" r=\"15\" fill=\"#2F8F66\"><\u002Fcircle><circle cx=\"62\" cy=\"60\" r=\"10\" fill=\"#43A86B\"><\u002Fcircle><circle cx=\"72\" cy=\"54\" r=\"8\" fill=\"#6FC089\"><\u002Fcircle>\n          <!-- center (tallest) -->\n          <path d=\"M115 92 C 115 80 118 56 119 46 L121 46 C 122 56 125 80 125 92 Z\" fill=\"#8A6A46\"><\u002Fpath>\n          <circle cx=\"120\" cy=\"40\" r=\"20\" fill=\"#2F8F66\"><\u002Fcircle><circle cx=\"111\" cy=\"44\" r=\"13\" fill=\"#43A86B\"><\u002Fcircle><circle cx=\"129\" cy=\"42\" r=\"12\" fill=\"#43A86B\"><\u002Fcircle><circle cx=\"122\" cy=\"33\" r=\"10\" fill=\"#6FC089\"><\u002Fcircle><circle cx=\"113\" cy=\"34\" r=\"5\" fill=\"#A6DCAE\"><\u002Fcircle>\n          <!-- sun -->\n          <circle cx=\"158\" cy=\"22\" r=\"8\" fill=\"#E0A458\"><\u002Fcircle>\n          <!-- right -->\n          <path d=\"M168 92 C 168 82 171 64 172 56 L174 56 C 175 64 178 82 178 92 Z\" fill=\"#8A6A46\"><\u002Fpath>\n          <circle cx=\"173\" cy=\"50\" r=\"17\" fill=\"#2F8F66\"><\u002Fcircle><circle cx=\"166\" cy=\"53\" r=\"11\" fill=\"#43A86B\"><\u002Fcircle><circle cx=\"180\" cy=\"50\" r=\"9\" fill=\"#6FC089\"><\u002Fcircle><circle cx=\"168\" cy=\"44\" r=\"5\" fill=\"#A6DCAE\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"padding: 30px 30px; display: flex; flex-direction: column; justify-content: center;\">\n        <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: -.02em; color: #1E5238;\">Shared roots<\u002Fdiv>\n        <p style=\"font-size: 15px; line-height: 1.6; color: #3A4D42; margin: 10px 0 16px;\">Separate trees of different heights — each person at their own pace — drawing from <strong style=\"color:#18241D;\">one connected root system<\u002Fstrong>. The togetherness lives underground, exactly like a real grove (a stand of aspens is one organism). Honest about individual progress, united at the base.<\u002Fp>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 7px;\">\n          <span style=\"font-size: 12px; font-weight: 700; color: #2E7D52; background: #E7F1EA; padding: 5px 11px; border-radius: 999px;\">Collective screen hero<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 700; color: #2E7D52; background: #E7F1EA; padding: 5px 11px; border-radius: 999px;\">Share cards<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== COLOR ===== -->\n  <section id=\"color\" style=\"max-width: 1100px; margin: 0 auto; padding: 64px 26px 40px;\">\n    <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">05 · Color<\u002Fspan>\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(30px, 4.6vw, 46px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 12px;\">Light &amp; dark, AA throughout<\u002Fh2>\n    <p style=\"font-size: 17px; line-height: 1.6; max-width: 640px; color: #3A4D42; margin: 0 0 32px;\">Leaf green leads, sun amber accents. Every text-on-fill pairing below clears <strong style=\"color:#18241D;\">WCAG AA<\u002Fstrong>. Named to drop straight into a Material 3 <code style=\"font-family: ui-monospace, monospace; font-size: 13px; background: #E7EEE7; padding: 1px 6px; border-radius: 5px;\">ColorScheme<\u002Fcode>.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px;\">\n\n      <!-- LIGHT -->\n      <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 22px;\">\n        <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 16px;\">\n          <span style=\"width: 18px; height: 18px; border-radius: 50%; background: #F3F6F1; border: 1px solid #C2D0C5;\"><\u002Fspan>\n          <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 18px;\">Light<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: grid; gap: 8px;\">\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #2E7D52;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #fff;\">primary<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: rgba(255,255,255,.85);\">#2E7D52<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #C8E6CF;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #14361F;\">primaryContainer<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #2E5A3E;\">#C8E6CF<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #E0A458;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #2A1C08;\">accent<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #5A3F18;\">#E0A458<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #FFFFFF; border: 1px solid #DCE6DD;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #18241D;\">surface<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #8A9890;\">#FFFFFF<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #E7EEE7;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #18241D;\">surfaceVariant<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #5E6E64;\">#E7EEE7<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #F3F6F1; border: 1px solid #DCE6DD;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #18241D;\">background<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #8A9890;\">#F3F6F1<\u002Fspan><\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #18241D;\"><div style=\"font-weight: 700; font-size: 13px; color: #F3F6F1;\">onSurface<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: #9FB0A4;\">#18241D<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #4A5A50;\"><div style=\"font-weight: 700; font-size: 13px; color: #F3F6F1;\">onSurfaceVar<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: #C2D0C5;\">#4A5A50<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #43A86B;\"><div style=\"font-weight: 700; font-size: 13px; color: #fff;\">treeHealthy<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: rgba(255,255,255,.85);\">#43A86B<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #A89274;\"><div style=\"font-weight: 700; font-size: 13px; color: #fff;\">treeWithered<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: rgba(255,2 e=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #7E8E84;\">#16221C<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #213029;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #E7F0E9;\">surfaceVariant<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #9FB0A4;\">#213029<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #0F1A15; border: 1px solid #2C3A32;\"><span style=\"flex:1; font-weight: 700; font-size: 14px; color: #E7F0E9;\">background<\u002Fspan><span style=\"font-family: ui-monospace, monospace; font-size: 12.5px; color: #7E8E84;\">#0F1A15<\u002Fspan><\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #E7F0E9;\"><div style=\"font-weight: 700; font-size: 13px; color: #0F1A15;\">onSurface<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: #5E6E64;\">#E7F0E9<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #A7B8AD;\"><div style=\"font-weight: 700; font-size: 13px; color: #0F1A15;\">onSurfaceVar<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: #2C3A32;\">#A7B8AD<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #5FD394;\"><div style=\"font-weight: 700; font-size: 13px; color: #07120C;\">treeHealthy<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: #1E4A33;\">#5FD394<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding: 12px 14px; border-radius: 12px; background: #B9A488;\"><div style=\"font-weight: 700; font-size: 13px; color: #1A130A;\">treeWithered<\u002Fdiv><div style=\"font-family: ui-monospace, monospace; font-size: 11.5px; color: #4A3D28;\">#B9A488<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== TYPE ===== -->\n  <section id=\"type\" style=\"max-width: 1100px; margin: 0 auto; padding: 64px 26px 40px;\">\n    <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">06 · Typography<\u002Fspan>\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(30px, 4.6vw, 46px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 32px;\">Two typefaces, free to ship<\u002Fh2>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; margin-bottom: 18px;\">\n      <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 28px;\">\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline;\">\n          <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 40px; letter-spacing: -.02em; color: #1E5238;\">Bricolage<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #2E7D52;\">Display<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size: 13.5px; color: #3A4D42; line-height: 1.5; margin-top: 10px;\">Warm humanist grotesque for headings &amp; the wordmark. Friendly contrast, a little character — never sterile.<\u002Fdiv>\n        <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-size: 26px; color: #18241D; margin-top: 16px; letter-spacing: -.01em;\">AaGg 0123 grow together<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 28px;\">\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline;\">\n          <span style=\"font-family: 'Hanken Grotesque', sans-serif; font-weight: 700; font-size: 40px; letter-spacing: -.01em; color: #1E5238;\">Hanken<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #2E7D52;\">UI / Body<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size: 13.5px; color: #3A4D42; line-height: 1.5; margin-top: 10px;\">Clean, neutral humanist sans for all interface text. Tall x-height stays legible at label sizes.<\u002Fdiv>\n        <div style=\"font-family: 'Hanken Grotesque', sans-serif; font-size: 26px; color: #18241D; margin-top: 16px;\">AaGg 0123 stay focused<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background: #fff; border: 1px solid #DCE6DD; border-radius: 22px; padding: 36px;\">\n      <div style=\"display: grid; gap: 22px;\">\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px 24px; align-items: baseline; border-bottom: 1px solid #EDF2EC; padding-bottom: 20px;\">\n          <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 52px; letter-spacing: -.03em; line-height: 1; color: #18241D;\">Grow your grove<\u002Fdiv>\n          <div style=\"font-family: ui-monospace, monospace; font-size: 12px; color: #8A9890;\">H1 · Bricolage 700 · 52/52 · -3%<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px 24px; align-items: baseline; border-bottom: 1px solid #EDF2EC; padding-bottom: 20px;\">\n          <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: 32px; letter-spacing: -.02em; line-height: 1.1; color: #18241D;\">Your circle is focusing<\u002Fdiv>\n          <div style=\"font-family: ui-monospace, monospace; font-size: 12px; color: #8A9890;\">H2 · Bricolage 600 · 32/35 · -2%<\u002Fdiv>\n t-shaded (no gradients).<\u002Fp>\n\n    <div style=\"margin-bottom: 40px;\">{{ styleRow }}<\u002Fdiv>\n\n    <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: 24px; letter-spacing: -.01em; margin: 0 0 6px;\">The library — 5 plants + 1 seasonal<\u002Fh3>\n    <p style=\"font-size: 15px; line-height: 1.6; max-width: 640px; color: #3A4D42; margin: 0 0 24px;\">Each grows through <strong style=\"color:#18241D;\">six levels<\u002Fstrong> — seed, sprout, sapling, young, mature, elder — plus a <strong style=\"color:#9A7E55;\">withered<\u002Fstrong> state for a failed session. A rare seventh level, <strong style=\"color:#2E7D52;\">Centenarian<\u002Fstrong>, is reserved for species famed for ancient giants — oak and pine (think sequoia). Same shape language, only the canopy scales and fills in.<\u002Fp>\n\n    {{ treeLibrary }}\n  <\u002Fsection>\n\n  <!-- ===== THEMES ===== -->\n  <section id=\"themes\" style=\"padding: 64px 26px 44px; background: #ECF1EB; border-top: 1px solid #DCE6DD; border-bottom: 1px solid #DCE6DD;\">\n    <div style=\"max-width: 1100px; margin: 0 auto;\">\n      <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">07b · Seasonal &amp; event skins<\u002Fspan>\n      <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(28px, 4.2vw, 42px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 12px;\">Dress the grove for the season<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.6; max-width: 660px; color: #3A4D42; margin: 0 0 30px;\">One tree, many moods. A <strong style=\"color:#18241D;\">theme skin<\u002Fstrong> recolors the canopy and layers light decorations on top of any plant or stage — a reason to come back, and a natural premium hook. Same silhouette underneath, so nothing breaks.<\u002Fp>\n      {{ themeRow }}\n      <p style=\"font-size: 13px; line-height: 1.5; color: #6E7E74; margin: 18px 0 0;\">Skins are a tint set + an overlay layer — cheap to add. Seasonal ones rotate automatically; event ones unlock for the moment (a World Cup, a holiday) and live in the user's collection after.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SCREENS ===== -->\n  <section id=\"screens\" style=\"max-width: 1180px; margin: 0 auto; padding: 64px 26px 40px;\">\n    <span style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2E7D52;\">08 · Product<\u002Fspan>\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: clamp(30px, 4.6vw, 46px); letter-spacing: -.02em; line-height: 1.04; margin: 4px 0 12px;\">Four screens, Material 3<\u002Fh2>\n    <p style=\"font-size: 17px; line-height: 1.6; max-width: 640px; color: #3A4D42; margin: 0 0 36px;\">The identity in motion — dark for focus, light for the garden. Tokens map 1:1 to the palette above.<\u002Fp>\n\n    <div style=\"display: flex; gap: 26px; flex-wrap: wrap; justify-content: center;\">\n\n      <!-- (a) FOCUS SESSION · dark -->\n      <div style=\"flex: 0 0 auto;\">\n        <div style=\"width: 290px; height: 600px; border-radius: 42px; background: #0F1A15; border: 1px solid #2C3A32; box-shadow: 0 24px 60px rgba(15,26,21,.28); overflow: hidden; position: relative; display: flex; flex-direction: column;\">\n          <div style=\"display: flex; justify-content: space-between; align-items: center; padding: 14px 22px 6px; font-size: 12px; font-weight: 700; color: #A7B8AD;\"><span>9:41<\u002Fspan><span style=\"display:flex; gap:5px; align-items:center;\">●●● ▮<\u002Fspan><\u002Fdiv>\n          <div style=\"padding: 8px 22px 0; display: flex; align-items: center; gap: 10px;\">\n            <span style=\"font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #6FD79B;\">Deep work<\u002Fspan>\n            <span style=\"margin-left: auto; font-size: 12.5px; color: #A7B8AD;\">Oak · sessio onst h = React.createElement;\n    return h('g', { key: 'soil' }, [\n      h('path', { key: 'sb', d: 'M16 110 Q50 95 84 110 Q84 116 50 116 Q16 116 16 110 Z', fill: soilBase }),\n      h('path', { key: 'st', d: 'M21 109 Q50 99 79 109 Q79 112 50 112.5 Q21 112 21 109 Z', fill: soilTop }),\n      this.circ(35, 108, 1.4, soilBase, 'd1'),\n      this.circ(63, 109, 1.2, soilBase, 'd2')\n    ]);\n  }\n\n  trunk(topY, w, k) {\n    const h = React.createElement;\n    const baseY = 110, cx = 50, half = w / 2, halfTop = w * 0.34;\n    const d = `M${cx-half} ${baseY} C ${cx-half} ${baseY-8} ${cx-halfTop} ${topY+7} ${cx-halfTop} ${topY} L ${cx+halfTop} ${topY} C ${cx+halfTop} ${topY+7} ${cx+half} ${baseY-8} ${cx+half} ${baseY} Z`;\n    return h('g', { key: k || 'tr' }, [\n      h('path', { key: 'tk', d: d, fill: '#8A6A46' }),\n      h('path', { key: 'hl', d: `M${cx-halfTop*0.55} ${topY+3} C ${cx-half*0.5} ${baseY-10} ${cx-half*0.5} ${baseY-10} ${cx-half*0.42} ${baseY-1}`, stroke: '#A6855E', strokeWidth: 1.5, fill: 'none', strokeLinecap: 'round' })\n    ]);\n  }\n\n  tier(x, baseY, w, hh, f, k) {\n    return React.createElement('path', { key: k, d: `M ${x} ${baseY-hh} Q ${x+w*0.8} ${baseY-hh*0.22} ${x+w} ${baseY} Q ${x+w*0.5} ${baseY+4} ${x} ${baseY+3} Q ${x-w*0.5} ${baseY+4} ${x-w} ${baseY} Q ${x-w*0.8} ${baseY-hh*0.22} ${x} ${baseY-hh} Z`, fill: f });\n  }\n\n  // layered organic canopy\n  canopy(type, cx, cy, s, sh) {\n    const h = React.createElement;\n    const c = (x, y, r, f, k) => this.circ(cx + x*s, cy + y*s, r*s, f, k);\n    switch (type) {\n      case 0: return h('g', {}, [ // oak\n        c(-12,4,15, sh.d,'a'), c(12,4,15, sh.d,'b'), c(0,-9,17, sh.d,'c'),\n        c(-9,0,12, sh.m,'d'), c(10,-1,12, sh.m,'e'), c(0,-11,14, sh.m,'f'), c(0,5,13, sh.m,'g'),\n        c(-6,-7,9, sh.l,'h'), c(5,-9,7, sh.l,'i'), c(-2,1,8, sh.l,'j'),\n        c(-9,-10,4.5, sh.hi,'k')\n      ]);\n      case 1: return h('g', {}, [ // pine\n        this.tier(cx, cy+15*s, 19*s, 22*s, sh.d,'p1'),\n        this.tier(cx, cy+4*s, 15*s, 20*s, sh.m,'p2'),\n        this.tier(cx, cy-7*s, 11*s, 18*s, sh.l,'p3'),\n        c(-4,-10,3.2, sh.hi,'ph')\n      ]);\n      case 2: return h('g', {}, [ // round bush\n        c(0,2,18, sh.d,'a'), c(-9,9,12, sh.d,'b'), c(9,9,12, sh.d,'c'),\n        c(0,-5,15, sh.m,'d'), c(-8,6,10, sh.m,'e'), c(8,6,10, sh.m,'f'),\n        c(-3,-9,9, sh.l,'g'), c(4,-4,8, sh.l,'h'),\n        c(-6,-10,4, sh.hi,'i')\n      ]);\n      case 3: { // willow\n        const strands = [];\n        for (let i = -2; i <= 2; i++) {\n          strands.push(h('path', { key: 'w'+i, d: `M${cx + i*8*s} ${cy+2*s} q ${i*2} ${15*s} ${i*1.2} ${26*s}`, stroke: (i%2 ? sh.l : sh.m), strokeWidth: 3*s, fill: 'none', strokeLinecap: 'round' }));\n        }\n        return h('g', {}, [\n          c(0,-4,18, sh.d,'a'), c(-10,-2,11, sh.d,'b'), c(10,-2,11, sh.d,'c'),\n          c(0,-9,14, sh.m,'d'), c(-6,-6,9, sh.l,'e'),\n          c(-7,-11,4, sh.hi,'f'),\n          ...strands\n        ]);\n      }\n      case 4: return h('g', {}, [ // birch\n        h('ellipse', { key: 'a', cx: cx, cy: cy-3*s, rx: 13*s, ry: 19*s, fill: sh.d }),\n        h('ellipse', { key: 'b', cx: cx-1*s, cy: cy-5*s, rx: 10*s, ry: 15*s, fill: sh.m }),\n        c(-4,9,8, sh.d,'c'), c(5,9,7, sh.m,'d'),\n        c(-3,-9,6, sh.l,'e'), c(-5,-11,3.2, sh.hi,'f')\n      ]);\n      case 5: { // cherry blossom\n        const dots = [];\n        for (let i=0;i<6;i++){ const a=(i/6)*Math.PI*2; dots.push(c(Math.cos(a)*13, -4+Math.sin(a)*12, 2.2, sh.accent,'pd'+i)); }\n        return h('g', {}, [\n          c(-11,2,13, sh.d,'a'), c(11,2,13, sh.d,'b'), c(0,-9,14, sh.d,'c'),\n          c(-7,-2,10, sh.m,'d'), c(7,-2,10, sh.m,'e'), c(0,4,11, sh.m,'f'),\n          c(-4,-7,8, sh.l,'g'), c(3,-3,7, sh.l,'h'),\n          c(-7,-9,4, sh.hi,'i'),\n          ...dots\n        ]);\n      }\n      default: return null;\n    }\n  }\n\n  // one plant svg (0 seed,1 sprout,2 sapling,3 young,4 mature,5 elder,6 withered)\n  plant(type, stage, sh, soilTop, soilBase, overlay) {\n    const h = React.createElement;\n    const kids = [this.soil(soilTop, soilBase)];\n    const cx = 50;\n    if (stage === 0) { // seed\n      kids.push(h('path', { key: 'mound', d: 'M38 107 Q50 100 62 107 Z', fill: soilTop }));\n      kids.push(this.circ(50, 104, 4.5, '#8A6A46', 'sd'));\n      kids.push(this.circ(48.4, 102.8, 1.6, '#A6855E', 'sdh'));\n      kids.push(h('path', { key: 'sp', d: 'M50 100 C 54 95 60 94 62 96 C 60 101 54 102 50 100 Z', fill: sh.m }));\n    } else if (stage === 1) { // sprout\n      kids.push(this.trunk(92, 4, 'st'));\n      kids.push(h('path', { key: 'l1', d: 'M50 94 C 40 92 33 84 32 74 C 43 74 50 82 50 94 Z', fill: sh.m }));\n      kids.push(h('path', { key: 'l2', d: 'M50 90 C 60 88 67 80 68 70 C 57 70 50 78 50 90 Z', fill: sh.d }));\n      kids.push(h('path', { key: 'l1h', d: 'M44 84 C 41 81 39 78 38.6 75', stroke: sh.l, strokeWidth: 1.4, fill: 'none', strokeLinecap: 'round' }));\n    } else if (stage === 2) { // sapling\n      kids.push(this.trunk(80, 4.6, 'tr'));\n      kids.push(this.canopy(type, cx, 64, 0.5, sh));\n    } else if (stage === 3) { // young\n      kids.push(this.trunk(72, 5.5, 'tr'));\n      kids.push(this.canopy(type, cx, 56, 0.68, sh));\n    } else if (stage === 4) { // mature\n      kids.push(this.trunk(60, 7.2, 'tr'));\n      kids.push(this.canopy(type, cx, 46, 0.9, sh));\n    } else if (stage === 5) { // elder\n      kids.push(this.trunk(52, 9.2, 'tr'));\n      kids.push(this.canopy(type, cx, 40, 1.14, sh));\n    } else if (stage === 6) { // withered\n      const w = { d:'#9A8463', m:'#B09A78', l:'#C4B190', hi:'#D6C8AC', accent:'#B09A78' };\n      kids.push(h('path', { key: 'tr', d: 'M46 110 C 45 92 50 74 47 60 C 46 56 49 54 51 56 C 54 70 53 92 54 110 Z', fill: '#8A7A60' }));\n      kids.push(h('g', { key: 'wc', transform: 'rotate(6 50 52)', opacity: .95 }, this.canopy(type, cx, 50, 0.78, w)));\n      kids.push(h('path', { key: 'f1', d: 'M68 78 q5 4 3 9', stroke: w.m, strokeWidth: 2.2, fill: 'none', strokeLinecap: 'round' }));\n      kids.push(this.circ(73, 92, 2, w.m, 'f2'));\n      kids.push(this.circ(30, 96, 1.8, w.l, 'f3'));\n    } else if (stage === 7) { // centenarian — a giant, grand species only\n      kids.push(this.trunk(46, 11, 'tr'));\n      kids.push(this.canopy(type, cx, 35, 1.34, sh));\n    }\n    if (overlay) overlay(kids, h);\n    return h('svg', { width: '100%', viewBox: '0 0 100 120', style: { display: 'block' } }, kids);\n  }\n\n  plantData() {\n    return [\n      { name: 'Oak', type: 0, sh: { d:'#2F8F66', m:'#43A86B', l:'#6FC089', hi:'#A6DCAE' }, grand: true },\n      { name: 'Pine', type: 1, sh: { d:'#1F7A57', m:'#2F8F66', l:'#52B07F', hi:'#8FD0A6' }, grand: true },\n      { name: 'Round bush', type: 2, sh: { d:'#3F9A63', m:'#56B279', l:'#7FCB95', hi:'#B3E4C0' } },\n      { name: 'Willow', type: 3, sh: { d:'#4F9A55', m:'#6FB36A', l:'#93C98C', hi:'#C4E6BD' } },\n      { name: 'Birch', type: 4, sh: { d:'#5FAE74', m:'#7FC58C', l:'#A6DCAE', hi:'#D2EFD7' } },\n      { name: 'Cherry blossom', type: 5, sh: { d:'#E58AAB', m:'#F3B6CB', l:'#FBD3E0', hi:'#FFE9F0', accent:'#E8728F' }, seasonal: true }\n    ];\n  }\n\n  // ---- themed-skin overlays (operate on a 0 0 100 120 svg) ----\n  ovSpring(kids, h) {\n    for (let i = 0; i < 9; i++) { const a = i/9*Math.PI*2; kids.push(this.circ(50+Math.cos(a)*20, 40+Math.sin(a)*17, 2.6, '#F7B9CE', 'bl'+i)); }\n    kids.push(h('path', { key:'pt1', d:'M31 76 q3 -3 6 0 q-3 3 -6 0 Z', fill:'#F2A8C2' }));\n    kids.push(h('path', { key:'pt2', d:'M69 86 q3 -3 6 0 q-3 3 -6 0 Z', fill:'#F7B9CE' }));\n    kids.push(h('path', { key:'pt3', d:'M57 95 q2.5 -2.5 5 0 q-2.5 2.5 -5 0 Z', fill:'#F2A8C2' }));\n  }\n  ovAutumn(kids, h) {\n    kids.push(h('path', { key:'al1', d:'M30 80 q3.5 -3.5 7 0 q-3.5 3.5 -7 0 Z', fill:'#C25E2A' }));\n    kids.push(h('path', { key:'al2', d:'M68 90 q3.5 -3.5 7 0 q-3.5 3.5 -7 0 Z', fill:'#E07B3A' }));\n    kids.push(h('path', { key:'al3', d:'M24 94 q3 -3 6 0 q-3 3 -6 0 Z', fill:'#
