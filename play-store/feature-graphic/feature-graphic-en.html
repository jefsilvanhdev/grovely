<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Feature Graphic — Grovely</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1024px;height:500px;overflow:hidden;font-family:'Hanken Grotesk',sans-serif;}
  .canvas{width:1024px;height:500px;position:relative;overflow:hidden;
    background:linear-gradient(150deg,#1E5238 0%,#2E7D52 55%,#256a45 100%);
    display:flex;align-items:center;justify-content:space-between;padding:0 76px;}
  .glow{position:absolute;width:620px;height:620px;border-radius:50%;
    background:radial-gradient(circle,rgba(224,164,88,.30) 0%,transparent 66%);
    top:-38%;right:-8%;pointer-events:none;}
  .leaf{position:absolute;border-radius:50% 0 50% 50%;opacity:.14;transform:rotate(30deg);}
  .left{position:relative;z-index:2;max-width:560px;}
  .eyebrow{font-size:15px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(200,230,207,.85);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:#E0A458;display:inline-block;}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:76px;line-height:.98;letter-spacing:-.02em;color:#fff;}
  h1 em{font-style:normal;color:#C8E6CF;}
  .tag{margin-top:18px;font-size:20px;color:rgba(231,240,233,.92);max-width:440px;line-height:1.4;}
  .right{position:relative;z-index:2;width:300px;height:300px;flex:none;}
  .right svg{width:100%;height:100%;filter:drop-shadow(0 20px 40px rgba(0,0,0,.28));}
</style>
</head>
<body>
  <div class="canvas">
    <div class="glow"></div>
    <div class="leaf" style="width:70px;height:70px;background:#6FD79B;top:70px;left:60px;"></div>
    <div class="leaf" style="width:44px;height:44px;background:#C8E6CF;bottom:60px;left:200px;transform:rotate(-20deg);"></div>
    <div class="leaf" style="width:54px;height:54px;background:#9FD3B4;bottom:120px;right:340px;"></div>
    <div class="left">
      <div class="eyebrow"><span class="dot"></span>Focus app · Android</div>
      <h1>Focus that grows.<br><em>Together.</em></h1>
      <p class="tag">Every minute of focus plants a tree. Grow your garden and focus with your circle.</p>
    </div>
    <div class="right">
      <svg viewBox="0 0 100 100">
        <circle cx="83" cy="15" r="7" fill="#E0A458"/>
        <path d="M27 36 Q31.5 43.5 34.8 53 Q38 62.5 39.5 70.5 Q33.5 74.8 27 74.8 Q20.5 74.8 14.5 70.5 Q16 62.5 19.2 53 Q22.5 43.5 27 36 Z" fill="#9FD3B4"/>
        <rect x="25.5" y="73.5" width="3" height="9.5" rx="1.5" fill="#9FD3B4"/>
        <path d="M73 29 Q78 38 81.8 48.5 Q85.5 59 87.2 68.5 Q80.5 73.3 73 73.3 Q65.5 73.3 58.8 68.5 Q60.5 59 64.2 48.5 Q68 38 73 29 Z" fill="#9FD3B4"/>
        <rect x="71.3" y="72" width="3.4" height="10.5" rx="1.7" fill="#9FD3B4"/>
        <path d="M50 13 Q56 23 60.5 36 Q65 49 67 62.5 Q58.8 68 50 68 Q41.2 68 33 62.5 Q35 49 39.5 36 Q44 23 50 13 Z" fill="#F3F6F1"/>
        <rect x="47.8" y="66.5" width="4.4" height="13.5" rx="2.2" fill="#F3F6F1"/>
        <path d="M13 86.5 Q50 79.5 87 86.5 Q87 90.5 50 90.5 Q13 90.5 13 86.5 Z" fill="#17402A"/>
      </svg>
    </div>
  </div>
</body>
</html>
