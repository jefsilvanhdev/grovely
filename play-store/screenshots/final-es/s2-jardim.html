<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1920px;overflow:hidden;font-family:'Hanken Grotesk',sans-serif;}
.canvas{width:1080px;height:1920px;position:relative;overflow:hidden;
  background:linear-gradient(172deg,#F3F6F1 0%,#EAF1EA 55%,#E1EAE1 100%);
  display:flex;flex-direction:column;align-items:center;}
.glow{position:absolute;width:900px;height:900px;border-radius:50%;
  background:radial-gradient(circle,rgba(46,125,82,.10) 0%,transparent 66%);
  top:44%;left:50%;transform:translate(-50%,-50%);}
.txt{position:relative;z-index:2;text-align:center;padding:104px 80px 44px;}
.eyebrow{font-size:19px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#2E7D52;
  display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:18px;}
.eyebrow .dot{width:8px;height:8px;border-radius:50%;background:#E0A458;}
h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:60px;line-height:1.02;
  letter-spacing:-.025em;color:#14361F;max-width:840px;margin:0 auto;}
.sub{margin-top:20px;font-size:25px;line-height:1.45;color:#4A5A50;max-width:720px;margin-left:auto;margin-right:auto;}
.device{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
.frame{width:600px;border-radius:44px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(46,125,82,.10),0 40px 90px rgba(20,54,31,.22),0 12px 30px rgba(20,54,31,.14);}
.frame img{display:block;width:100%;height:auto;}
.wm{position:absolute;bottom:60px;left:72px;z-index:3;display:flex;align-items:center;gap:12px;}
.wm svg{width:42px;height:42px;}
.wm .name{font-family:'Bricolage Grotesque';font-weight:700;font-size:30px;color:#2E7D52;letter-spacing:-.01em;}
</style></head><body><div class="canvas">
<div class="glow"></div>
<div class="txt">
  <div class="eyebrow"><span class="dot"></span>Tu jardín</div>
  <h1>Cada enfoque<br>es un árbol.</h1>
  <p class="sub">Colecciona especies, mantén tu racha y mira el jardín llenarse.</p>
</div>
<div class="device"><div class="frame"><img src="../raw-es/garden.png" alt=""></div></div>
<div class="wm"><svg viewBox="0 0 100 100"><circle cx="83" cy="15" r="7" fill="#E0A458"/><path d="M27 36 Q31.5 43.5 34.8 53 Q38 62.5 39.5 70.5 Q33.5 74.8 27 74.8 Q20.5 74.8 14.5 70.5 Q16 62.5 19.2 53 Q22.5 43.5 27 36 Z" fill="#43A86B"/><rect x="25.5" y="73.5" width="3" height="9.5" rx="1.5" fill="#8A6A46"/><path d="M73 29 Q78 38 81.8 48.5 Q85.5 59 87.2 68.5 Q80.5 73.3 73 73.3 Q65.5 73.3 58.8 68.5 Q60.5 59 64.2 48.5 Q68 38 73 29 Z" fill="#43A86B"/><rect x="71.3" y="72" width="3.4" height="10.5" rx="1.7" fill="#8A6A46"/><path d="M50 13 Q56 23 60.5 36 Q65 49 67 62.5 Q58.8 68 50 68 Q41.2 68 33 62.5 Q35 49 39.5 36 Q44 23 50 13 Z" fill="#1E5238"/><rect x="47.8" y="66.5" width="4.4" height="13.5" rx="2.2" fill="#8A6A46"/><path d="M13 86.5 Q50 79.5 87 86.5 Q87 90.5 50 90.5 Q13 90.5 13 86.5 Z" fill="#C2A878"/></svg><span class="name">Grovely</span></div>
</div></body></html>
